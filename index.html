<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sales Dashboard — Fore Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ========== ORIGINAL STYLE ========== */
:root{
  --bg:#070a0e;--bg2:#0d1117;--bg3:#141b22;--surface:#141b22;--surface2:#1c2530;
  --border:#1e2d3d;--border2:#243040;
  --accent:#00e5ff;--accent2:#00ff9d;--accent3:#ff4d6d;--accent4:#ffc233;--accent5:#a78bfa;
  --gmv:#f472b6;--offline:#60a5fa;--online:#34d399;--gofood:#fb923c;--grabfood:#4ade80;--shopee:#f87171;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#475569;--text4:#2d3f52;
  --amber:#ffc233;--blue:#60a5fa;--red:#ff4d6d;--purple:#a78bfa;--green:#4ade80;
  --grid-line:rgba(30,45,61,0.8);
  --card-shadow:0 4px 24px rgba(0,0,0,0.4);
  --glow-accent:0 0 20px rgba(0,229,255,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.header{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;position:relative;z-index:100;}
.header-logo{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.header-sep{width:1px;height:20px;background:var(--border2);}
.header-store{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;letter-spacing:1px;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.header-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.header-status{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--accent2);font-family:'JetBrains Mono',monospace;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.btn-refresh{background:transparent;border:1px solid var(--border2);color:var(--accent);padding:5px 12px;border-radius:6px;font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;letter-spacing:1px;transition:all .2s;}
.btn-refresh:hover{background:rgba(0,229,255,0.08);border-color:var(--accent);}
.nav{height:40px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:stretch;padding:0 12px;gap:2px;flex-shrink:0;overflow-x:auto;}
.nav::-webkit-scrollbar{display:none;}
.nav-btn{background:none;border:none;color:var(--text3);padding:0 14px;font-size:11px;font-family:'Syne',sans-serif;font-weight:600;letter-spacing:.5px;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px;}
.nav-btn:hover{color:var(--text2);}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.nav-icon{font-size:12px;}
.app-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.page{display:none;flex:1;overflow-y:auto;padding:20px;}
.page.active{display:block;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px 20px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.2),transparent);}
.sec-label{display:flex;align-items:center;gap:10px;margin-bottom:14px;margin-top:24px;}
.sec-label:first-child{margin-top:0;}
.sec-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 8px var(--accent);}
.sec-text{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);}
.sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent);}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:16px;}
.kpi-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s;}
.kpi-card:hover{border-color:var(--accent);}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--kpi-color,var(--accent));}
.kpi-lbl{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--text);line-height:1;margin-bottom:4px;}
.kpi-sub{font-size:10px;color:var(--text3);}
.kpi-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;margin-top:4px;}
.badge-up{background:rgba(0,255,157,0.1);color:var(--accent2);}
.badge-dn{background:rgba(255,77,109,0.1);color:var(--accent3);}
.badge-neu{background:rgba(148,163,184,0.1);color:var(--text2);}
.chart-row{display:grid;gap:12px;margin-bottom:12px;}
.chart-row-2{grid-template-columns:1fr 1fr;}
.chart-row-3{grid-template-columns:1fr 1fr 1fr;}
.chart-title{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:14px;}
.chart-wrap{position:relative;}
.chart-wrap canvas{width:100%!important;}
.h200{height:200px;}
.h260{height:260px;}
.h300{height:300px;}
.h340{height:340px;}
.full{grid-column:1/-1;}
.target-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;}
.target-row label{font-size:10px;color:var(--text3);font-family:'Syne',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.inp{background:var(--bg);border:1px solid var(--border2);color:var(--text);padding:7px 12px;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;min-width:160px;transition:border-color .2s;}
.inp:focus{border-color:var(--accent);}
.inp-sm{min-width:80px;}
.btn{background:var(--accent);color:#000;border:none;padding:8px 18px;border-radius:8px;font-size:11px;font-weight:700;font-family:'Syne',sans-serif;letter-spacing:1px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2);}
.btn-ghost:hover{border-color:var(--text2);background:rgba(148,163,184,.08);}
.gauge-wrap{position:relative;display:flex;flex-direction:column;align-items:center;}
.gauge-center{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);text-align:center;}
.gauge-pct{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700;line-height:1;}
.gauge-lbl{font-size:10px;color:var(--text3);margin-top:2px;}
.pace-bar-wrap{margin-top:8px;}
.pace-bg{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.pace-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.chan-contrib{display:flex;flex-direction:column;gap:10px;}
.chan-item{display:flex;align-items:center;gap:10px;}
.chan-name{font-size:11px;color:var(--text);min-width:70px;}
.chan-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.chan-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.chan-pct{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);min-width:40px;text-align:right;}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{border-collapse:collapse;width:100%;font-size:11px;}
thead th{background:var(--bg3);padding:9px 12px;text-align:left;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:9px 12px;border-bottom:1px solid rgba(30,45,61,.5);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:rgba(20,27,34,.8);}
.td-mono{font-family:'JetBrains Mono',monospace;font-size:10px;}
.td-accent{color:var(--accent);font-weight:700;}
.sticky{position:sticky;left:0;z-index:2;background:var(--bg2);}
.arr-up{color:var(--accent2);}
.arr-dn{color:var(--accent3);}
.arr-neu{color:var(--text3);}
.inline-arr{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;}
.inline-arr.arr-up{background:rgba(0,255,157,.1);}
.inline-arr.arr-dn{background:rgba(255,77,109,.1);}
.mini-compare{width:100%;}
.mini-compare thead th{background:var(--bg3);padding:8px 12px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;}
.mini-compare tbody td{padding:8px 12px;border-bottom:1px solid rgba(30,45,61,.4);font-size:11px;}
.mini-compare .mc-total td{font-weight:700;color:var(--text);}
.mc-chan{font-weight:600;color:var(--text2);}
.period-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.period-grid-2{grid-template-columns:1fr 1fr;}
.period-header{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.p1-color{color:var(--accent);}
.p2-color{color:var(--amber);}
.p3-color{color:var(--accent2);}
.fldt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.fldt-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;border-top:2px solid var(--fc-color,var(--accent));}
.fldt-icon{font-size:20px;margin-bottom:8px;}
.fldt-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--fc-color,var(--accent));margin-bottom:4px;}
.fldt-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--text);margin-bottom:6px;}
.fldt-bar-wrap{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.fldt-bar{height:100%;border-radius:2px;background:var(--fc-color,var(--accent));transition:width .8s ease;}
.fldt-weeks{display:flex;flex-direction:column;gap:5px;}
.fldt-week-row{display:flex;align-items:center;gap:8px;font-size:10px;}
.fldt-week-lbl{color:var(--text3);width:20px;font-family:'JetBrains Mono',monospace;}
.fldt-week-bar-wrap{flex:1;height:14px;background:var(--bg);border-radius:3px;overflow:hidden;}
.fldt-week-bar{height:100%;border-radius:3px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .8s ease;}
.fldt-week-num{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:rgba(0,0,0,.75);}
.mode-toggle{display:flex;gap:6px;margin-left:auto;}
.mode-btn{background:transparent;border:1px solid var(--border2);color:var(--text3);padding:5px 12px;border-radius:6px;font-size:10px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .2s;}
.mode-btn.active{background:rgba(0,229,255,.1);border-color:var(--accent);color:var(--accent);}
.chan-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px;}
.chan-tab{background:transparent;border:1px solid var(--border);color:var(--text3);padding:4px 10px;border-radius:6px;font-size:10px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;}
.chan-tab.active{background:rgba(0,229,255,.1);border-color:var(--accent);color:var(--accent);}
.chan-rank{display:flex;flex-direction:column;gap:10px;}
.chan-rank-item{display:flex;align-items:center;gap:12px;}
.rank-num{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;background:var(--bg3);color:var(--text3);flex-shrink:0;}
.rank-1{background:rgba(255,194,51,.15);color:var(--amber);}
.rank-2{background:rgba(148,163,184,.1);color:var(--text2);}
.rank-3{background:rgba(251,146,60,.1);color:var(--gofood);}
.rank-info{flex:1;min-width:0;}
.rank-name{font-size:12px;font-weight:600;color:var(--text);}
.rank-val{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.rank-bar-wrap{flex:2;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
.rank-bar{height:100%;border-radius:3px;transition:width .8s ease;}
.rank-pct{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;min-width:44px;text-align:right;}
.summ-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.summ-kpi-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.summ-kpi-label{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.summ-kpi-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;margin-bottom:3px;}
.summ-kpi-sub{font-size:10px;color:var(--text3);}
.c-gmv{color:var(--gmv);}
.c-at{color:var(--blue);}
.c-adt{color:var(--amber);}
.d2d-group-header{background:var(--bg3);padding:8px 12px;font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-left:3px solid var(--group-color,var(--accent));}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:14px;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:12px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.mb12{margin-bottom:12px;}
.mb16{margin-bottom:16px;}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cmp-table thead th{background:var(--bg3);}
.cmp-total{background:rgba(0,229,255,.03)!important;}
.cmp-total td{font-weight:700;}
.sg-chan{font-size:11px;font-weight:600;color:var(--text2);}
.arrow-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
@media(max-width:768px){
  .period-grid,.period-grid-2,.fldt-grid,.g2,.g3,.chart-row-2,.chart-row-3{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .summ-kpi-row{grid-template-columns:1fr;}
}

/* ========== LIQUID GLASS UPGRADE (ditambahkan tanpa menghapus asli) ========== */
.aurora-bg {
  position: fixed; top:0; left:0; width:100%; height:100%; z-index:-2;
  background: radial-gradient(circle at 20% 30%, rgba(0,40,50,0.6), transparent 60%),
              radial-gradient(circle at 80% 70%, rgba(0,255,157,0.12), transparent 70%);
  animation: auroraShift 24s infinite alternate; pointer-events: none;
}
@keyframes auroraShift { 0%{opacity:0.5;} 100%{opacity:1;} }
.noise-overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.028'/%3E%3C/svg%3E");
  pointer-events: none; z-index:-1; opacity:0.4;
}
.glass-header { backdrop-filter: blur(32px); background: rgba(5, 5, 5, 0.55); border-bottom: 0.5px solid rgba(255,255,255,0.06); }
.card, .kpi-card, .target-row, .fldt-card, .summ-kpi-card, .period-grid .card {
  backdrop-filter: blur(16px); background: rgba(13, 17, 23, 0.75); border: 0.5px solid rgba(255,255,255,0.05);
  transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
}
.card:hover, .kpi-card:hover, .fldt-card:hover {
  transform: translateY(-2px); border-color: rgba(0,229,255,0.3);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 0.5px rgba(0,229,255,0.1);
}
.floating-dock {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 8px; background: rgba(10, 12, 18, 0.75); backdrop-filter: blur(36px);
  border: 0.5px solid rgba(255,255,255,0.1); border-radius: 60px; padding: 8px 20px; z-index: 200;
}
.dock-item {
  background: transparent; border: none; padding: 8px 18px; border-radius: 40px;
  font-size: 0.75rem; font-weight: 600; color: #b0b8c5; cursor: pointer; font-family: 'Syne', sans-serif;
}
.dock-item.active { background: rgba(0, 229, 255, 0.16); color: #00e5ff; box-shadow: 0 0 12px rgba(0,229,255,0.2); }
.dock-item:hover { background: rgba(255,255,255,0.05); transform: translateY(-2px); }
.cmd-modal {
  position: fixed; top:0; left:0; width:100%; height:100%; backdrop-filter: blur(48px);
  background: rgba(0,0,0,0.6); z-index:1000; display: flex; align-items: center; justify-content: center;
  visibility: hidden; opacity: 0; transition: 0.2s;
}
.cmd-modal.active { visibility: visible; opacity: 1; }
.cmd-panel { width: 560px; background: rgba(12, 16, 24, 0.88); backdrop-filter: blur(48px); border-radius: 48px; border: 0.5px solid rgba(255,255,255,0.1); padding: 20px; }
.cmd-input { width: 100%; background: rgba(0,0,0,0.5); border: none; padding: 18px 20px; border-radius: 60px; font-size: 1rem; color: white; font-family: 'JetBrains Mono', monospace; outline: none; }
.cmd-list { margin-top: 20px; max-height: 320px; overflow-y: auto; }
.cmd-item { padding: 12px 16px; border-radius: 20px; cursor: pointer; color: #e2e8f0; font-family: 'DM Sans', sans-serif; }
.cmd-item:hover, .cmd-item.selected { background: rgba(0,229,255,0.12); }
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.7); backdrop-filter: blur(40px); border-radius: 60px;
  padding: 10px 22px; color: white; font-size: 0.8rem; z-index: 300; opacity: 0; transition: 0.2s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.kpi-card, .card, .fldt-card, .target-row { animation: fadeSlideUp 0.4s ease-out forwards; }
@media (max-width: 768px) { .floating-dock { gap: 2px; padding: 6px 12px; } .dock-item { padding: 6px 12px; font-size: 0.65rem; } .cmd-panel { width: 90%; } }
</style>
</head>
<body>
<div class="aurora-bg"></div>
<div class="noise-overlay"></div>

<!-- HEADER (dengan glass) -->
<div class="header glass-header">
  <div class="header-logo">FORE COFFEE</div>
  <div class="header-sep"></div>
  <div class="header-store">KEMANG RAYA</div>
  <div class="header-right">
    <div class="header-time" id="clock"></div>
    <div class="header-status"><div class="status-dot"></div><span id="last-updated">LIVE</span></div>
    <button class="btn-refresh" id="refreshBtn" onclick="loadData()">↺ REFRESH</button>
    <button class="btn-refresh" id="cmdLauncher" style="margin-left:4px;">⌘K</button>
  </div>
</div>

<!-- NAV (asli) -->
<nav class="nav">
  <button class="nav-btn active" onclick="showPage('kpi',this)"><span class="nav-icon">◈</span>KPI SUMMARY</button>
  <button class="nav-btn" onclick="showPage('channel',this)"><span class="nav-icon">◉</span>CHANNEL</button>
  <button class="nav-btn" onclick="showPage('period',this)"><span class="nav-icon">⊞</span>WEEK TO WEEK</button>
  <button class="nav-btn" onclick="showPage('fldt',this)"><span class="nav-icon">◧</span>FLDT</button>

Chart.defaults.color = TC.text2;
Chart.defaults.font = { family: "'DM Sans', sans-serif", size: 11 };
const fmtRp = v => { v = v || 0; const abs = Math.abs(v); if(abs>=1e9) return 'Rp '+(abs/1e9).toFixed(2)+'M'; if(abs>=1e6) return 'Rp '+(abs/1e6).toFixed(1)+'jt'; if(abs>=1e3) return 'Rp '+(abs/1e3).toFixed(0)+'rb'; return 'Rp '+Math.round(abs); };

const parseNum = s => { if(!s||s.trim()==='') return 0; return parseFloat(s.replace(/[^0-9.-]/g,''))||0; };
const sum = (arr,k) => arr.reduce((a,b)=>a+(b[k]||0),0);

const pct = (a,b) => b ? a/b*100 : 0;
const safePct = (a,b) => b>0 ? ((a-b)/b*100) : 0;
function destroyChart(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }
function baseOptions(yFmt='rp'){ return { responsive:true, maintainAspectRatio:false, animation:{duration:700}, plugins:{legend:{labels:{color:TC.text2,font:{size:10}}}, tooltip:{backgroundColor:'rgba(13,17,23,0.96)',titleColor:TC.text,bodyColor:TC.text2}}, scales:{x:{grid:{color:TC.grid}, ticks:{color:TC.text3}}, y:{ticks:{callback:v=>yFmt==='rp'?fmtRp(v):fmtNum(v)}}} }; }
function grad(ctx,color,a1=0.3,a2=0){ const {chartArea}=ctx.chart; if(!chartArea) return 'transparent'; const g=ctx.chart.ctx.createLinearGradient(0,chartArea.top,0,chartArea.bottom); const hex=color.startsWith('#')?color:'#00e5ff'; const r=parseInt(hex.slice(1,3),16), gb=parseInt(hex.slice(3,5),16), b2=parseInt(hex.slice(5,7),16); g.addColorStop(0,`rgba(${r},${gb},${b2},${a1})`); g.addColorStop(1,`rgba(${r},${gb},${b2},${a2})`); return g; }
async function loadData(){ document.getElementById('last-updated').textContent='LOADING...'; try{ const res=await fetch(CSV_URL+'&t='+Date.now()); const text=await res.text(); allData=parseCSV(text); document.getElementById('last-updated').textContent=new Date().toLocaleTimeString('id-ID'); initDefaults(); renderCurrentPage(); showToast('Data refreshed'); } catch(e){ document.getElementById('last-updated').textContent='ERROR'; console.error(e); } }
function parseCSV(text){ const lines=text.trim().split('\n'); const headers=parseCSVLine(lines[0]).map(h=>h.trim().replace(/^"|"$/g,'').toUpperCase()); const rows=[]; for(let i=1;i<lines.length;i++){ const vals=parseCSVLine(lines[i]); if(!vals[0]) continue; const row={}; headers.forEach((h,idx)=>{ row[h]=(vals[idx]||'').trim().replace(/^"|"$/g,''); }); let d=null; const raw=row['TANGGAL']; if(raw){ const parts=raw.split('/'); if(parts.length===3) d=new Date(parseInt(parts[2]),parseInt(parts[0])-1,parseInt(parts[1])); else d=new Date(raw); } if(!d||isNaN(d)) continue; row._date=d; row._dateStr=toInputDate(d); const numCols=['GMV','ADT STORE','AT STORE','OFFLINE SALES','ADT OFFLINE','AT OFFLINE','ONLINE SALES','ADT ONLINE','AT ONLINE','GOFOOD SALES','ADT GOFOOD','AT GOFOOD','GRABFOOD SALES','ADT GRABFOOD','AT GRABFOOD','SHOPE FOOD SALES','ADT SHOPEFOOD','AT SHOPPE','TOTAL SOLD CUP OFFLINE','FOOD SOLD QTY','FOOD SOLD SALES','FOOD OFFLINE','LARGE OFFLINE','DIARY OFFLINE','TOPPING OFFLINE','TOTAL SOLD RTD','RTD OFFLINE','SEASONAL SOLD','TOTAL PRODUK TERJUAL','MERCHENDISE','TANPA MERCHENDISE','IPT']; numCols.forEach(c=>{ row['_n_'+c]=parseNum(row[c]||'0'); }); rows.push(row); } return rows.sort((a,b)=>a._date-b._date); }
function parseCSVLine(line){ const result=[]; let cur='', inQ=false; for(let i=0;i<line.length;i++){ if(line[i]==='"') inQ=!inQ; else if(line[i]===','&&!inQ){ result.push(cur); cur=''; } else cur+=line[i]; } result.push(cur); return result; }
function mapRow(r){ return { date: r._dateStr, _date: r._date, gmv: r['_n_GMV'], offline: r['_n_OFFLINE SALES'], online: r['_n_ONLINE SALES'], gofood: r['_n_GOFOOD SALES'], grabfood: r['_n_GRABFOOD SALES'], shopee: r['_n_SHOPE FOOD SALES'], adt_store: r['_n_ADT STORE'], adt_offline: r['_n_ADT OFFLINE'], adt_online: r['_n_ADT ONLINE'], adt_gofood: r['_n_ADT GOFOOD'], adt_grabfood: r['_n_ADT GRABFOOD'], adt_shopee: r['_n_ADT SHOPEFOOD'], at_store: r['_n_AT STORE'], at_offline: r['_n_AT OFFLINE'], cup_total: r['_n_TOTAL SOLD CUP OFFLINE'], food_off: r['_n_FOOD OFFLINE'], large_off: r['_n_LARGE OFFLINE'], diary_off: r['_n_DIARY OFFLINE'], topping_off: r['_n_TOPPING OFFLINE'], rtd_off: r['_n_RTD OFFLINE'], seasonal_sold: r['_n_SEASONAL SOLD'], food_qty_all: r['_n_FOOD SOLD QTY'], food_sales: r['_n_FOOD SOLD SALES'], rtd_qty_all: r['_n_TOTAL SOLD RTD'], ipt: r['_n_IPT'], offline_sales: r['_n_OFFLINE SALES'] }; }
function filterData(s,e){ const start=new Date(s), end=new Date(e); end.setHours(23,59,59,999); return allData.filter(r=>r._date>=start&&r._date<=end).map(mapRow); }
function aggregateData(rows){ if(!rows.length) return null; const s=k=>rows.reduce((a,r)=>a+(r[k]||0),0); return { gmv:s('gmv'), offline:s('offline'), online:s('online'), gofood:s('gofood'), grabfood:s('grabfood'), shopee:s('shopee'), adt_store:s('adt_store'), adt_offline:s('adt_offline'), adt_online:s('adt_online'), adt_gofood:s('adt_gofood'), adt_grabfood:s('adt_grabfood'), adt_shopee:s('adt_shopee'), at_store:s('gmv')/s('adt_store'), at_offline:s('offline_sales')/s('adt_offline'), cup_total:s('cup_total'), food_off:s('food_off'), large_off:s('large_off'), diary_off:s('diary_off'), topping_off:s('topping_off'), rtd_off:s('rtd_off'), seasonal_sold:s('seasonal_sold'), food_qty_all:s('food_qty_all'), food_sales:s('food_sales'), rtd_qty_all:s('rtd_qty_all'), offline_sales:s('offline_sales'), daily:rows }; }
function initDefaults(){ if(!allData.length) return; const now=new Date(); const yesterday=toInputDate(new Date(now.getFullYear(),now.getMonth(),now.getDate()-1)); const monthStart=toInputDate(new Date(now.getFullYear(),now.getMonth(),1)); setIfEmpty('kpi-start',monthStart); setIfEmpty('kpi-end',yesterday); setIfEmpty('kpi-days',String(new Date(now.getFullYear(),now.getMonth()+1,0).getDate())); setIfEmpty('kpi-target','700000000'); setIfEmpty('ch-start',monthStart); setIfEmpty('ch-end',yesterday); const mon=now.getDate()-now.getDay()+1; const monW3=new Date(now.getFullYear(),now.getMonth(),mon); const monW2=new Date(monW3); monW2.setDate(monW3.getDate()-7); const monW1=new Date(monW3); monW1.setDate(monW3.getDate()-14); setIfEmpty('range1s',toInputDate(monW1)); setIfEmpty('range1e',toInputDate(new Date(monW1.getTime()+6*86400000))); setIfEmpty('range2s',toInputDate(monW2)); setIfEmpty('range2e',toInputDate(new Date(monW2.getTime()+6*86400000))); setIfEmpty('range3s',toInputDate(monW3)); setIfEmpty('range3e',yesterday); setIfEmpty('summ-p1s',monthStart); setIfEmpty('summ-p1e',yesterday); setIfEmpty('d2d-start',monthStart); setIfEmpty('d2d-end',yesterday); }
function setIfEmpty(id,val){ const el=document.getElementById(id); if(el&&!el.value) el.value=val; }
function getVal(id){ return document.getElementById(id)?.value||''; }
let currentPage='kpi';
function showPage(p,btn){ document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active')); document.getElementById('page-'+p)?.classList.add('active'); if(btn) btn.classList.add('active'); currentPage=p; if(allData.length) renderPage(p); }

function updateClock(){ document.getElementById('clock').textContent=new Date().toLocaleString('id-ID',{dateStyle:'medium',timeStyle:'short'}); } updateClock(); setInterval(updateClock,30000);
function calcKpi(){ const s=getVal('kpi-start'), e=getVal('kpi-end'); if(!s||!e||!allData.length) return; const rows=filterData(s,e); if(!rows.length) return; const target=parseNum(getVal('kpi-target')||'0'); const totalDays=parseInt(getVal('kpi-days'))||30; const data=aggregateData(rows); const elapsed=rows.length; const dailyTarget=target/totalDays; const avgDaily=data.gmv/elapsed; const remaining=Math.max(0,totalDays-elapsed); const forecastEom=data.gmv+avgDaily*remaining; const achPct=target?pct(data.gmv,target):0; const idealPct=pct(elapsed,totalDays)*100; const vsIdeal=achPct-idealPct; const ma7=rows.map((d,i)=>{ const slice=rows.slice(Math.max(0,i-6),i+1); return {date:d.date,value:slice.reduce((a,r)=>a+r.gmv,0)/slice.length}; }); const total=data.offline+data.gofood+data.grabfood+data.shopee||1; const contrib={offline:pct(data.offline,total),gofood:pct(data.gofood,total),grabfood:pct(data.grabfood,total),shopee:pct(data.shopee,total),online:pct(data.online,data.gmv)}; const kpis=[{l:'Target GMV',v:fmtRp(target),c:'var(--accent)'},{l:'Current GMV',v:fmtRp(data.gmv),s:elapsed+' hari',c:'var(--gmv)'},{l:'Gap to Target',v:fmtRp(Math.abs(target-data.gmv)),s:target-data.gmv<=0?'✓ Tercapai':'Kurang',c:target-data.gmv<=0?'var(--accent2)':'var(--accent3)'},{l:'Achievement',v:fmtPct(achPct),s:'dari target',c:achPct>=100?'var(--accent2)':achPct>=80?'var(--amber)':'var(--accent3)'},{l:'Ideal Achievement',v:fmtPct(idealPct),s:elapsed+'/'+totalDays+' hari',c:'var(--accent)'},{l:'vs Ideal',v:(vsIdeal>=0?'+':'')+fmtPct(vsIdeal),s:vsIdeal>=0?'Ahead':'Behind',c:vsIdeal>=0?'var(--accent2)':'var(--accent3)'},{l:'Daily Target',v:fmtRp(dailyTarget),s:'per hari',c:'var(--amber)'},{l:'Avg Daily GMV',v:fmtRp(avgDaily),s:'aktual',c:'var(--offline)'},{l:'Forecast EOM',v:fmtRp(forecastEom),s:forecastEom>=target?'✓':'⚠',c:forecastEom>=target?'var(--accent2)':'var(--accent3)'},{l:'Pace vs Target',v:fmtPct(target?pct(avgDaily,dailyTarget):0),s:'kecepatan saat ini',c:'var(--purple)'},{l:'Total Transaksi',v:fmtNum(sum(rows,'adt_store')),s:'all transactions',c:'var(--online)'},{l:'Avg IPT',v:avg(rows,'ipt').toFixed(2),s:'item per transaksi',c:'var(--amber)'}]; document.getElementById('kpi-cards').innerHTML=kpis.map(k=>`<div class="kpi-card" style="--kpi-color:${k.c}"><div class="kpi-lbl">${k.l}</div><div class="kpi-val" style="color:${k.c}">${k.v}</div>${k.s?`<div class="kpi-sub">${k.s}</div>`:''}</div>`).join(''); buildGauge(achPct); const contribItems=[{name:'GoFood',val:contrib.gofood,color:TC.gofood},{name:'Offline',val:contrib.offline,color:TC.offline},{name:'GrabFood',val:contrib.grabfood,color:TC.grabfood},{name:'Shopee',val:contrib.shopee,color:TC.shopee},{name:'Online',val:contrib.online,color:TC.online}].sort((a,b)=>b.val-a.val); document.getElementById('kpi-contrib').innerHTML=contribItems.map(c=>`<div class="chan-item"><div class="chan-name">${c.name}</div><div class="chan-track"><div class="chan-fill" style="width:${Math.min(c.val,100)}%;background:${c.color};"></div></div><div class="chan-pct">${fmtPct(c.val)}</div></div>`).join(''); const pacePct=target?pct(avgDaily,dailyTarget):0; const paceColor=pacePct>=100?'var(--accent2)':pacePct>=80?'var(--amber)':'var(--accent3)'; document.getElementById('pace-info').innerHTML=`<div><div style="font-size:32px;font-weight:700;color:${paceColor}">${fmtPct(pacePct)}</div><div>Pace vs Daily Target</div><div class="pace-bar-wrap"><div class="pace-bg"><div class="pace-fill" style="width:${Math.min(pacePct,100)}%;background:${paceColor};"></div></div></div></div><div class="g2">${[{l:'Daily Target',v:fmtRp(dailyTarget)},{l:'Avg Daily',v:fmtRp(avgDaily)},{l:'Sisa Hari',v:remaining+' hari'},{l:'Forecast EOM',v:fmtRp(forecastEom)}].map(x=>`<div><div>${x.l}</div><div>${x.v}</div></div>`).join('')}</div>`; buildKpiTrend(rows,ma7); buildKpiStacked(rows); }
function buildGauge(pct2){ destroyChart('gauge'); const clamped=Math.min(pct2,100); const color=pct2>=100?TC.accent2:pct2>=80?TC.amber:'#ff4d6d'; charts.gauge=new Chart(document.getElementById('gaugeChart'),{type:'doughnut',data:{datasets:[{data:[clamped,100-clamped],backgroundColor:[color,'rgba(255,255,255,0.04)'],borderWidth:0,circumference:220,rotation:-110}]},options:{cutout:'80%',plugins:{legend:{display:false}}}}); document.getElementById('gauge-pct').textContent=fmtPct(pct2); document.getElementById('gauge-pct').style.color=color; }

function buildKpiStacked(rows){ destroyChart('kpiStacked'); charts.kpiStacked=new Chart(document.getElementById('kpi-stacked-chart'),{type:'bar',data:{labels:rows.map(r=>fmtShortDate(r.date)),datasets:[{label:'Offline',data:rows.map(r=>r.offline),backgroundColor:TC.offline},{label:'GoFood',data:rows.map(r=>r.gofood),backgroundColor:TC.gofood},{label:'GrabFood',data:rows.map(r=>r.grabfood),backgroundColor:TC.grabfood},{label:'Shopee',data:rows.map(r=>r.shopee),backgroundColor:TC.shopee}]},options:{...baseOptions(),scales:{x:{stacked:true},y:{stacked:true}}}}); }

function applyChannelFilter(){ const s=getVal('ch-start'), e=getVal('ch-end'); if(!s||!e||!allData.length) return; _chRows=filterData(s,e); if(!_chRows.length) return; const d=aggregateData(_chRows); const total=d.offline+d.gofood+d.grabfood+d.shopee||1; const kpis=[{l:'Total GMV',v:fmtRp(d.gmv)},{l:'Offline Sales',v:fmtRp(d.offline)},{l:'GoFood',v:fmtRp(d.gofood)},{l:'GrabFood',v:fmtRp(d.grabfood)},{l:'Shopee',v:fmtRp(d.shopee)},{l:'Online (Total)',v:fmtRp(d.online)},{l:'ADT Store',v:fmtRp(d.adt_store)},{l:'AT Offline',v:fmtRp(d.at_offline)}]; document.getElementById('ch-kpi-cards').innerHTML=kpis.map(k=>`<div class="kpi-card"><div class="kpi-lbl">${k.l}</div><div class="kpi-val">${k.v}</div></div>`).join(''); const channels=[{name:'Offline',val:d.offline,color:TC.offline},{name:'GoFood',val:d.gofood,color:TC.gofood},{name:'GrabFood',val:d.grabfood,color:TC.grabfood},{name:'Shopee',val:d.shopee,color:TC.shopee}]; destroyChart('chPie'); charts.chPie=new Chart(document.getElementById('ch-pie-chart'),{type:'doughnut',data:{labels:channels.map(c=>c.name),datasets:[{data:channels.map(c=>c.val),backgroundColor:channels.map(c=>c.color+'cc')}]}}); destroyChart('chBar'); charts.chBar=new Chart(document.getElementById('ch-bar-chart'),{type:'bar',data:{labels:channels.map(c=>c.name),datasets:[{data:channels.map(c=>c.val),backgroundColor:channels.map(c=>c.color+'cc')}]},options:baseOptions()}); const maxV=Math.max(...channels.map(c=>c.val),1); document.getElementById('ch-breakdown-list').innerHTML=channels.map(c=>`<div><div style="background:${c.color}"></div><div>${c.name}</div><div><div style="width:${pct(c.val,maxV)}%"></div></div><div>${fmtRp(c.val)}</div><div>${fmtPct(pct(c.val,total))}</div></div>`).join(''); const adtData=[{n:'Store',v:d.adt_store},{n:'Offline',v:d.adt_offline},{n:'Online',v:d.adt_online},{n:'GoFood',v:d.adt_gofood},{n:'GrabFood',v:d.adt_grabfood},{n:'Shopee',v:d.adt_shopee}]; destroyChart('chAdt'); charts.chAdt=new Chart(document.getElementById('ch-adt function resetChannelFilter(){ const now=new Date(); document.getElementById('ch-start').value=toInputDate(new Date(now.getFullYear(),now.getMonth(),1)); document.getElementById('ch-end').value=toInputDate(new Date(now.getFullYear(),now.getMonth(),now.getDate()-1)); applyChannelFilter(); }

function loadD2D(){ const s=getVal('d2d-start'), e=getVal('d2d-end'); if(!s||!e||!allData.length) return; const rows=filterData(s,e); if(!rows.length){ document.getElementById('d2d-table-wrap').innerHTML='<div>Tidak ada data</div>'; return; } let html='<table><thead><tr><th>Tanggal</th><th>GMV</th><th>Offline</th><th>GoFood</th></tr></thead><tbody>'; rows.forEach(r=>{ html+=`<tr><td>${r.date}</td><td>${fmtRp(r.gmv)}</td><td>${fmtRp(r.offline)}</td><td>${fmtRp(r.gofood)}</td></tr>`; }); html+='</tbody></table>'; document.getElementById('d2d-table-wrap').innerHTML=html; }
const fmtShortDate = s => { if(!s) return '—'; const [y,m,d]=s.split('-').map(Number); return `${d}/${m}`; };
function buildDock(){ const pages=['kpi','channel','period','fldt','allsumm','d2d']; const labels=['KPI','CHANNEL','W/W','FLDT','SUMMARY','D2D']; const dock=document.getElementById('floatingDock'); dock.innerHTML=''; pages.forEach((p,i)=>{ const btn=document.createElement('button'); btn.className='dock-item'+(currentPage===p?' active':''); btn.innerText=labels[i]; btn.onclick=()=>{ showPage(p,btn); document.querySelectorAll('.dock-item').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }; dock.appendChild(btn); }); }
function commandPaletteInit(){ const modal=document.getElementById('cmdModal'); const input=document.getElementById('cmdInput'); const listDiv=document.getElementById('cmdList'); const commands=['kpi','channel','period','fldt','allsumm','d2d','refresh']; function render(f=''){ listDiv.innerHTML=commands.filter(c=>c.includes(f.toLowerCase())).map(c=>`<div class="cmd-item" data-cmd="${c}">${c.toUpperCase()}</div>`).join(''); } render(); listDiv.onclick=e=>{ const cmd=e.target.closest('.cmd-item')?.dataset.cmd; if(cmd==='refresh') loadData(); else if(cmd) showPage(cmd); modal.classList.remove('active'); }; input.oninput=()=>render(input.value); document.addEventListener('keydown',e=>{ if((e.metaKey||e.ctrlKey)&&e.key==='k'){ e.preventDefault(); modal.classList.toggle('active'); if(modal.classList.contains('active')) input.focus(); } }); document.getElementById('cmdLauncher').onclick=()=>{ modal.classList.toggle('active'); input.focus(); }; modal.onclick=e=>{ if(e.target===modal) modal.classList.remove('active'); }; }
function showToast(msg){ const t=document.getElementById('toastMsg'); if(t){ t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); } }
commandPaletteInit(); buildDock(); loadData();
</script>
